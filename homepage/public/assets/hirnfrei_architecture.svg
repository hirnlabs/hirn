<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Drop Shadow Filter -->
    <filter id="box-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.06" />
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <!-- Linear Gradients -->
    <linearGradient id="hirn-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" id="grad-stop1" />
      <stop offset="100%" id="grad-stop2" />
    </linearGradient>
  </defs>

  <style>
    /* Default light mode styles */
    .bg { fill: #f7f7f5; transition: fill 0.3s ease; }
    .text-title { fill: #1c1c1a; font-family: 'Plus Jakarta Sans', system-ui, sans-serif; font-weight: 700; font-size: 15px; }
    .text-header { fill: #2a2a28; font-family: 'Plus Jakarta Sans', system-ui, sans-serif; font-weight: 700; font-size: 18px; }
    .text-body { fill: #63635e; font-family: 'JetBrains Mono', monospace; font-size: 11px; }
    .text-tag { fill: #7e7e7b; font-family: 'JetBrains Mono', monospace; font-weight: 500; font-size: 10px; }
    
    .box-outer { fill: url(#hirn-bg); stroke: #cbd5e1; stroke-width: 1.5; rx: 16; }
    .box-inner { fill: #ffffff; stroke: #e2e2df; stroke-width: 1.25; rx: 8; transition: all 0.3s ease; }
    .box-accent { fill: #ffffff; stroke: #0d9488; stroke-width: 1.5; rx: 8; }
    
    .line { stroke: #cbd5e1; stroke-width: 1.5; fill: none; stroke-linecap: round; }
    .line-active { stroke: #0d9488; stroke-width: 2; fill: none; stroke-dasharray: 4 4; stroke-linecap: round; animation: flow 25s linear infinite; }
    
    #grad-stop1 { stop-color: #fafafa; }
    #grad-stop2 { stop-color: #f1f5f9; }

    @keyframes flow {
      to {
        stroke-dashoffset: -1000;
      }
    }

    /* Dark mode overrides */
    @media (prefers-color-scheme: dark) {
      .text-title { fill: #f3f4f6; }
      .text-header { fill: #ffffff; }
      .text-body { fill: #9ca3af; }
      .text-tag { fill: #9ca3af; }
      
      .box-outer { stroke: #374151; }
      .box-inner { fill: #18181b; stroke: #27272a; }
      .box-accent { fill: #18181b; stroke: #14b8a6; }
      
      .line { stroke: #27272a; }
      .line-active { stroke: #14b8a6; }
      
      #grad-stop1 { stop-color: #121214; }
      #grad-stop2 { stop-color: #0b0b0d; }
    }
  </style>

  <!-- Background Canvas -->
  <rect width="100%" height="100%" class="bg" rx="20" />

  <!-- Background grid or tech details -->
  <g opacity="0.15">
    <circle cx="440" cy="225" r="210" fill="none" stroke="currentColor" stroke-width="0.5" stroke-dasharray="8 8" />
    <circle cx="440" cy="225" r="140" fill="none" stroke="currentColor" stroke-width="0.5" stroke-dasharray="4 4" />
  </g>

  <!-- ================= CLIENTS ================= -->
  
  <!-- Mobile Client (Top Left) -->
  <g transform="translate(60, 50)" filter="url(#box-shadow)">
    <!-- Phone shape -->
    <rect width="70" height="120" rx="12" fill="#1c1c1a" stroke="#4b5563" stroke-width="2" />
    <!-- Screen -->
    <rect x="4" y="8" width="62" height="104" rx="8" fill="#09090b" />
    <!-- Speaker / camera notch -->
    <rect x="23" y="12" width="24" height="4" rx="2" fill="#27272a" />
    <!-- UI elements inside phone -->
    <circle cx="35" cy="50" r="12" fill="#0d9488" opacity="0.2" />
    <rect x="15" y="74" width="40" height="6" rx="2" fill="#27272a" />
    <rect x="20" y="84" width="30" height="4" rx="2" fill="#18181b" />
    
    <text x="35" y="145" text-anchor="middle" class="text-title">Mobile App</text>
  </g>

  <!-- Local Desktop Client (Bottom Left) -->
  <g transform="translate(60, 240)" filter="url(#box-shadow)">
    <!-- Monitor shape -->
    <rect width="110" height="70" rx="8" class="box-inner" />
    <rect x="4" y="4" width="102" height="62" rx="4" class="bg" />
    <!-- Desktop Stand -->
    <path d="M 45 70 L 35 90 L 75 90 L 65 70 Z" fill="#4b5563" stroke="#374151" stroke-width="1" />
    <!-- Screen UI mock -->
    <rect x="12" y="12" width="86" height="8" rx="2" fill="#0d9488" opacity="0.3" />
    <rect x="12" y="26" width="50" height="6" rx="1.5" fill="#9ca3af" opacity="0.5" />
    <rect x="12" y="36" width="70" height="6" rx="1.5" fill="#9ca3af" opacity="0.3" />
    <circle cx="88" cy="46" r="6" fill="#14b8a6" opacity="0.4" />
    
    <text x="55" y="110" text-anchor="middle" class="text-title">Web UI / CLI</text>
  </g>

  <!-- ================= SYSTEM CORE (HIRN) ================= -->
  
  <!-- Outer System Box -->
  <g transform="translate(280, 45)" filter="url(#box-shadow)">
    <rect width="280" height="325" class="box-outer" />
    <rect x="15" y="-12" width="80" height="24" rx="6" fill="#0d9488" />
    <text x="55" y="4" text-anchor="middle" fill="#ffffff" font-family="'Plus Jakarta Sans', sans-serif" font-weight="700" font-size="11" tracking="2">HIRN</text>
    <text x="265" y="25" text-anchor="end" class="text-tag">DESKTOP SYSTEM</text>

    <!-- Component 1: Local LLM Server -->
    <g transform="translate(30, 45)">
      <rect width="220" height="65" class="box-inner" />
      <text x="15" y="24" class="text-title">Local LLM Server</text>
      <text x="15" y="42" class="text-body">llama.cpp / vLLM / exo</text>
      <circle cx="200" cy="32" r="5" fill="#14b8a6" filter="url(#glow)" />
    </g>

    <!-- Component 2: Model Router -->
    <g transform="translate(30, 135)">
      <rect width="220" height="65" class="box-accent" />
      <text x="15" y="24" class="text-title" fill="#0d9488">Model Router</text>
      <text x="15" y="42" class="text-body">Effort Routing &amp; Intent</text>
      <!-- Small split lines visual -->
      <path d="M 185 24 L 195 32 L 185 40" fill="none" stroke="#0d9488" stroke-width="1.5" stroke-linecap="round" />
      <path d="M 195 24 L 205 32 L 195 40" fill="none" stroke="#14b8a6" stroke-width="1.5" stroke-linecap="round" />
    </g>

    <!-- Component 3: Managed Agent (pi) -->
    <g transform="translate(30, 225)">
      <rect width="220" height="65" class="box-inner" />
      <text x="15" y="24" class="text-title">Managed Agent</text>
      <text x="15" y="42" class="text-body">pi framework + ACP</text>
      <rect x="175" y="22" width="30" height="20" rx="4" fill="#0d9488" opacity="0.15" />
      <text x="190" y="35" text-anchor="middle" fill="#0d9488" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="700">pi</text>
    </g>

    <!-- Internal Core Connections -->
    <path d="M 140 110 L 140 135" class="line" stroke-width="2" />
    <path d="M 140 200 L 140 225" class="line" stroke-width="2" />
  </g>

  <!-- ================= EXTERNAL RESOURCES (RIGHT) ================= -->
  
  <g transform="translate(630, 65)">
    <!-- Box 1: File System -->
    <g transform="translate(0, 0)">
      <rect width="110" height="45" rx="6" class="box-inner" />
      <text x="12" y="26" class="text-title" font-size="12">File System</text>
    </g>

    <!-- Box 2: Local Shell -->
    <g transform="translate(0, 70)">
      <rect width="110" height="45" rx="6" class="box-inner" />
      <text x="12" y="26" class="text-title" font-size="12">Local Shell</text>
    </g>

    <!-- Box 3: Web Browser -->
    <g transform="translate(0, 140)">
      <rect width="110" height="45" rx="6" class="box-inner" />
      <text x="12" y="26" class="text-title" font-size="12">Web Browser</text>
    </g>

    <!-- Box 4: STT / Audio -->
    <g transform="translate(0, 210)">
      <rect width="110" height="45" rx="6" class="box-inner" />
      <text x="12" y="26" class="text-title" font-size="12">STT Audio</text>
    </g>
  </g>

  <!-- ================= MAIN EDGE CONNECTORS ================= -->
  
  <!-- VPN Connector: Mobile App -> HIRN Router -->
  <path d="M 130 110 Q 210 110 310 180" class="line-active" />
  <rect x="180" y="110" width="70" height="18" rx="4" class="box-inner" />
  <text x="215" y="122" text-anchor="middle" class="text-tag" font-size="9">WG VPN</text>

  <!-- Localhost Connector: Web UI -> HIRN Agent -->
  <path d="M 170 275 Q 240 275 310 270" class="line" />
  <text x="225" y="265" text-anchor="middle" class="text-tag" font-size="9">localhost</text>

  <!-- Resource Connectors: HIRN Agent -> Resources -->
  <!-- Agent to File System -->
  <path d="M 530 270 C 580 270 590 100 630 87" class="line" />
  <!-- Agent to Shell -->
  <path d="M 530 270 C 580 270 590 160 630 157" class="line" />
  <!-- Agent to Browser -->
  <path d="M 530 270 C 580 270 590 220 630 227" class="line" />
  <!-- Agent to Audio STT -->
  <path d="M 530 270 C 580 270 590 295 630 297" class="line" />

</svg>
