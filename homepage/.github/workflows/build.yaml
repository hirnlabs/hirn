name: Build

on:
    pull_request:
        branches:
            - main

permissions:
    contents: read

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest
            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 22
            - name: Cache Bun dependencies
              uses: actions/cache@v4
              with:
                  path: ~/.bun/install/cache
                  key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
                  restore-keys: |
                      ${{ runner.os }}-bun-

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Check types
              run: bun run check

            - name: Run linter
              run: bun run lint

            - name: Cache build
              id: cache-build
              uses: actions/cache@v4
              with:
                path: dist/
                key: ${{ runner.os }}-build-${{ hashFiles('**/src/**', '**/astro.config.ts', '**/package.json') }}
                restore-keys: |
                  ${{ runner.os }}-build-

            - name: Build
              if: steps.cache-build.outputs.cache-hit != 'true'
              run: bun run tina:build & bun run build

            - name: Upload dist artifact
              uses: actions/upload-artifact@v4
              with:
                  name: dist
                  path: dist/
                  retention-days: 1
